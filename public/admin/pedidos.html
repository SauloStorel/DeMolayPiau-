<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
  <link rel="icon" type="image/png" href="/images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos – Admin DeMolay Piauí</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="/css/shop.css">
</head>
<body>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/" class="sidebar-brand">
        <img src="/images/logo.png" alt="DeMolay Piauí">
        <div>
          <strong>DeMolay Piauí</strong>
          <span>Painel Admin</span>
        </div>
      </a>

      <p class="sidebar-title">Documentos</p>
      <ul class="sidebar-nav">
        <li>
          <a href="/admin/panel.html" >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
            Gerenciar Docs
          </a>
        </li>
      </ul>

      <hr class="sidebar-divider">

      <p class="sidebar-title">Loja</p>
      <ul class="sidebar-nav">
        <li>
          <a href="/admin/produtos.html" >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            Produtos
          </a>
        </li>
        <li>
          <a href="/admin/pedidos.html" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            Pedidos
          </a>
        </li>
      </ul>

      <hr class="sidebar-divider">

      <ul class="sidebar-nav">
        <li>
          <a href="/" style="font-size:0.82rem;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Ver Site
          </a>
        </li>
        <li>
          <a href="#" id="logoutBtn" style="color:var(--danger)!important;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sair
          </a>
        </li>
      </ul>
      <div class="sidebar-credit">
        Site feito por <a href="https://storel.space/" target="_blank" rel="noopener">Saulo Storel</a>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-page-title">
        <h1>Pedidos</h1>
        <p>Inscrições e compras realizadas na loja</p>
      </div>

      <!-- Stats -->
      <div class="orders-stats" id="orders-stats" style="display:none;">
        <div class="order-stat-card">
          <div class="order-stat-icon green">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          </div>
          <div class="order-stat-info">
            <strong id="stat-total">0</strong>
            <span>Total de Pedidos</span>
          </div>
        </div>
        <div class="order-stat-card">
          <div class="order-stat-icon gold">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          </div>
          <div class="order-stat-info">
            <strong id="stat-revenue">R$ 0</strong>
            <span>Receita Total</span>
          </div>
        </div>
        <div class="order-stat-card">
          <div class="order-stat-icon red">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="order-stat-info">
            <strong id="stat-pending">0</strong>
            <span>Aguardando Pagamento</span>
          </div>
        </div>
      </div>

      <!-- Filtros -->
      <div class="orders-filters">
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn gold" data-filter="pending">Aguardando</button>
        <button class="filter-btn" data-filter="paid">Pagos</button>
        <button class="filter-btn red" data-filter="cancelled">Cancelados</button>
      </div>

      <div id="orders-list">
        <div class="loading-wrap"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <script src="/js/shop.js"></script>
  <script>
    fetch('/api/auth/check').then(r => { if (!r.ok) location.href = '/admin/index.html'; });
    document.getElementById('logoutBtn').addEventListener('click', async e => {
      e.preventDefault();
      await fetch('/api/auth/logout', { method: 'POST' });
      location.href = '/admin/index.html';
    });

    let allOrders = [];
    let currentFilter = 'all';

    async function loadOrders() {
      const list = document.getElementById('orders-list');
      try {
        allOrders = await fetch('/api/admin/shop/orders').then(r => r.json());
        renderStats();
        renderOrders();
        document.getElementById('orders-stats').style.display = 'grid';
      } catch {
        list.innerHTML = '<p class="text-muted">Erro ao carregar pedidos.</p>';
      }
    }

    function renderStats() {
      const paid = allOrders.filter(o => o.status === 'paid');
      document.getElementById('stat-total').textContent = allOrders.length;
      document.getElementById('stat-revenue').textContent = formatBRL(paid.reduce((s, o) => s + o.total, 0));
      document.getElementById('stat-pending').textContent = allOrders.filter(o => o.status === 'pending').length;
    }

    function renderOrders() {
      const list = document.getElementById('orders-list');
      const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);

      if (!filtered.length) {
        list.innerHTML = `<div class="empty-state"><p>Nenhum pedido${currentFilter === 'all' ? '' : ' com este status'}.</p></div>`;
        return;
      }

      const statusLabels = { pending: 'Aguardando', paid: 'Pago', cancelled: 'Cancelado' };

      list.innerHTML = filtered.map(order => {
        const date = new Date(order.createdAt).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

        const itemsHtml = (order.items || []).map(i => `
          <div class="order-item-row">
            <span class="order-item-name">${escapeHtml(i.productName)}${i.variantName ? ' <em style="color:var(--text-muted)">– '+escapeHtml(i.variantName)+'</em>' : ''}</span>
            <span class="order-item-lot">${escapeHtml(i.lotName)} × ${i.quantity}</span>
            <span class="order-item-price">${formatBRL(i.price * i.quantity)}</span>
          </div>`).join('');

        return `
          <div class="order-card status-${order.status}">
            <div class="order-card-header">
              <div class="order-card-left">
                <span class="order-customer-name">${escapeHtml(order.customer.name)}</span>
                <span class="status-badge status-${order.status}">${statusLabels[order.status]}</span>
                <span class="order-id">#${order.id.slice(0,8).toUpperCase()}</span>
                <span class="order-date">${date}</span>
              </div>
              <div class="order-card-right">
                <span class="order-total">${formatBRL(order.total)}</span>
                <select class="order-status-select" onchange="updateStatus('${order.id}', this.value)">
                  <option value="pending" ${order.status==='pending'?'selected':''}>Aguardando</option>
                  <option value="paid"    ${order.status==='paid'   ?'selected':''}>Pago</option>
                  <option value="cancelled" ${order.status==='cancelled'?'selected':''}>Cancelado</option>
                </select>
              </div>
            </div>
            <div class="order-card-body">
              <div class="order-contact">
                <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${escapeHtml(order.customer.email)}</span>
                <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.01 1.17 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>${escapeHtml(order.customer.phone)}</span>
                ${order.customer.chapter ? `<span>Cap. ${escapeHtml(order.customer.chapter)}</span>` : ''}
              </div>
              <div class="order-items">${itemsHtml}</div>
              ${order.notes ? `<div class="order-notes">Obs: ${escapeHtml(order.notes)}</div>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    async function updateStatus(orderId, status) {
      await fetch(`/api/admin/shop/orders/${orderId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      const idx = allOrders.findIndex(o => o.id === orderId);
      if (idx >= 0) allOrders[idx].status = status;
      renderOrders();
    }

    // Filtros
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderOrders();
      });
    });

    function escapeHtml(str) {
      const d = document.createElement('div'); d.textContent = String(str||''); return d.innerHTML;
    }

    loadOrders();
  </script>
</body>
</html>
