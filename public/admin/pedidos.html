<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
  <link rel="icon" type="image/png" href="/images/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos – Admin DeMolay Piauí</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="/css/shop.css">
</head>
<body>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="/" class="sidebar-brand">
        <img src="/images/logo.png" alt="DeMolay Piauí">
        <div>
          <strong>DeMolay Piauí</strong>
          <span>Painel Admin</span>
        </div>
      </a>
      <p class="sidebar-title">Loja</p>
      <ul class="sidebar-nav">
        <li><a href="/admin/produtos.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
          </svg>Produtos
        </a></li>
        <li><a href="/admin/pedidos.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>Pedidos
        </a></li>
      </ul>
      <hr class="sidebar-divider">
      <ul class="sidebar-nav">
        <li><a href="/admin/panel.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
          </svg>Gerenciar Docs
        </a></li>
        <li><a href="#" id="logoutBtn" style="color:var(--danger)!important;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>Sair
        </a></li>
      </ul>
    </aside>

    <main class="admin-main">
      <div class="admin-page-title">
        <h1 style="font-size:1.6rem;">Pedidos</h1>
        <p style="color:var(--text-muted);font-size:0.88rem;margin:0;">Inscrições e compras realizadas na loja</p>
      </div>

      <!-- Filtros de status -->
      <div class="d-flex gap-1 flex-wrap mb-3">
        <button class="year-btn active" data-filter="all">Todos</button>
        <button class="year-btn" data-filter="pending">Aguardando Pagamento</button>
        <button class="year-btn" data-filter="paid">Pagos</button>
        <button class="year-btn" data-filter="cancelled">Cancelados</button>
      </div>

      <div id="orders-list">
        <div class="loading-wrap"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <script src="/js/shop.js"></script>
  <script>
    fetch('/api/auth/check').then(r => { if (!r.ok) location.href = '/admin/index.html'; });
    document.getElementById('logoutBtn').addEventListener('click', async e => {
      e.preventDefault();
      await fetch('/api/auth/logout', { method: 'POST' });
      location.href = '/admin/index.html';
    });

    let allOrders = [];
    let currentFilter = 'all';

    async function loadOrders() {
      const list = document.getElementById('orders-list');
      try {
        allOrders = await fetch('/api/admin/shop/orders').then(r => r.json());
        renderOrders();
      } catch {
        list.innerHTML = '<p class="text-muted">Erro ao carregar pedidos.</p>';
      }
    }

    function renderOrders() {
      const list = document.getElementById('orders-list');
      const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);

      if (!filtered.length) {
        list.innerHTML = `<div class="empty-state"><p>Nenhum pedido ${currentFilter === 'all' ? '' : 'com este status'}.</p></div>`;
        return;
      }

      list.innerHTML = filtered.map(order => {
        const statusLabels = { pending: 'Aguardando', paid: 'Pago', cancelled: 'Cancelado' };
        const statusClass = { pending: 'status-pending', paid: 'status-paid', cancelled: 'status-cancelled' };
        const date = new Date(order.createdAt).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

        const itemsHtml = (order.items||[]).map(i =>
          `<div style="font-size:0.82rem;color:var(--text-muted);">• ${escapeHtml(i.productName)}${i.variantName ? ' – '+i.variantName : ''} (${escapeHtml(i.lotName)}) × ${i.quantity} = <strong style="color:var(--gold);">${formatBRL(i.price * i.quantity)}</strong></div>`
        ).join('');

        return `
          <div class="admin-doc-item" style="flex-wrap:wrap;gap:0.75rem;align-items:flex-start;margin-bottom:0.75rem;">
            <div style="flex:1;min-width:280px;">
              <div class="d-flex align-center gap-2 mb-1" style="flex-wrap:wrap;">
                <strong style="color:var(--white);font-size:0.92rem;">${escapeHtml(order.customer.name)}</strong>
                <span class="status-badge ${statusClass[order.status]}">${statusLabels[order.status]}</span>
                <span style="font-size:0.75rem;color:var(--text-muted);">#${order.id.slice(0,8).toUpperCase()}</span>
              </div>
              <div style="font-size:0.78rem;color:var(--text-muted);">
                ${escapeHtml(order.customer.email)} · ${escapeHtml(order.customer.phone)} · Cap. ${escapeHtml(order.customer.chapter || '—')}
              </div>
              <div style="margin-top:0.5rem;">${itemsHtml}</div>
              ${order.notes ? `<div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.3rem;">Obs: ${escapeHtml(order.notes)}</div>` : ''}
              <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">${date}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem;min-width:160px;">
              <div style="font-family:var(--font-heading);font-size:1.2rem;color:var(--gold);font-weight:700;">${formatBRL(order.total)}</div>
              <select class="form-control" style="font-size:0.8rem;padding:0.3rem 0.6rem;width:auto;" onchange="updateStatus('${order.id}', this.value)">
                <option value="pending" ${order.status==='pending'?'selected':''}>Aguardando</option>
                <option value="paid" ${order.status==='paid'?'selected':''}>Pago</option>
                <option value="cancelled" ${order.status==='cancelled'?'selected':''}>Cancelado</option>
              </select>
            </div>
          </div>`;
      }).join('');
    }

    async function updateStatus(orderId, status) {
      await fetch(`/api/admin/shop/orders/${orderId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      const idx = allOrders.findIndex(o => o.id === orderId);
      if (idx >= 0) allOrders[idx].status = status;
      renderOrders();
    }

    // Filtros
    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderOrders();
      });
    });

    function escapeHtml(str) {
      const d = document.createElement('div'); d.textContent = String(str||''); return d.innerHTML;
    }

    loadOrders();
  </script>
</body>
</html>
